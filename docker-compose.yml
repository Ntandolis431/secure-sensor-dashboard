services:
  # Web Server & PHP Processor (built locally with PDO MySQL)
  web:
    build: .
    container_name: encata-web
    volumes:
      - ./www:/var/www/html
    networks:
      - lemp-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: encata-nginx
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - lemp-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: encata-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sensor_data
      MYSQL_USER: sensor_user
      MYSQL_PASSWORD: sensor_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lemp-network

volumes:
  db_data:

networks:
  lemp-network:
    driver: bridge